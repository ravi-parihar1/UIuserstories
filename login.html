<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reservation - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 450px; margin: 80px auto;">
            <div class="text-center">
                <h1 style="color: #667eea; margin-bottom: 10px;">Hotel Reservation System</h1>
                <h2>Welcome Back</h2>
                <p style="color: #666; margin-bottom: 30px;">Login to access your account</p>
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username or email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <div class="form-group">
                    <label style="display: flex; align-items: center;">
                        <input type="checkbox" id="remember" name="remember" style="width: auto; margin-right: 10px;">
                        Remember me
                    </label>
                </div>
                
                <div class="btn-group" style="justify-content: center;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                </div>
                
                <div class="text-center mt-20">
                    <p>Don't have an account? <a href="registration.html" style="color: #667eea; text-decoration: none;">Register here</a></p>
                    <p style="margin-top: 10px; font-size: 14px; color: #666;">
                        Admin Login: Username: <strong>admin</strong>, Password: <strong>admin123</strong>
                    </p>
                </div>
            </form>
            
            <div class="text-center" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e1e8ed;">
                <h4 style="color: #333; margin-bottom: 15px;">Quick Access</h4>
                <div class="btn-group" style="justify-content: center;">
                    <button class="btn btn-secondary" onclick="demoLogin('customer')">Customer Demo</button>
                    <button class="btn btn-secondary" onclick="demoLogin('admin')">Admin Demo</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        // Demo login function for testing
        function demoLogin(type) {
            if (type === 'admin') {
                document.getElementById('username').value = 'admin';
                document.getElementById('password').value = 'admin123';
            } else {
                document.getElementById('username').value = 'customer';
                document.getElementById('password').value = 'password';
            }
        }
        
        // Check if user is already logged in
        window.addEventListener('load', function() {
            const loggedInUser = localStorage.getItem('hotelCurrentUser');
            if (loggedInUser) {
                const user = JSON.parse(loggedInUser);
                if (user.role === 'admin') {
                    window.location.href = 'admin-home.html';
                } else {
                    window.location.href = 'customer-home.html';
                }
            }
        });
    </script>
</body>
</html>
