<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reservation - My Bookings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <div class="logo">🏨 Hotel Reservation</div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="#" onclick="navigateTo('customer-home.html')">Home</a></li>
                    <li><a href="#" onclick="navigateTo('reservation.html')">Reservation</a></li>
                    <li><a href="#" onclick="navigateTo('billing.html')">Billing Page</a></li>
                    <li><a href="#" onclick="navigateTo('history.html')">History</a></li>
                    <li><a href="#" onclick="navigateTo('bookings.html')">Bookings</a></li>
                    <li><a href="#" onclick="navigateTo('support.html')">Contact Support</a></li>
                </ul>
            </nav>
            <div class="user-info">
                <span class="welcome-text">Welcome Guest</span>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h1 style="color: #667eea; margin-bottom: 10px;">My Upcoming Bookings</h1>
            <p style="color: #666; margin-bottom: 30px;">View and manage your upcoming reservations</p>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="displayBookings()">🔄 Refresh</button>
                <button class="btn btn-success" onclick="navigateTo('reservation.html')">📅 New Booking</button>
                <button class="btn btn-warning" onclick="exportBookings()">📊 Export</button>
            </div>
        </div>
        
        <div class="card">
            <h2>Upcoming Reservations</h2>
            <div id="bookingsList">
                <div class="spinner"></div>
            </div>
        </div>
        
        <div class="card">
            <h2>Booking Statistics</h2>
            <div class="grid grid-3">
                <div class="text-center">
                    <h3 style="color: #667eea; font-size: 2em;" id="totalBookingsCount">0</h3>
                    <p>Total Bookings</p>
                </div>
                <div class="text-center">
                    <h3 style="color: #51cf66; font-size: 2em;" id="upcomingCount">0</h3>
                    <p>Upcoming Stays</p>
                </div>
                <div class="text-center">
                    <h3 style="color: #ffa502; font-size: 2em;" id="totalSpent">$0</h3>
                    <p>Total Spent</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        window.addEventListener('load', function() {
            displayBookings();
            updateBookingStats();
        });
        
        function updateBookingStats() {
            const currentUser = JSON.parse(localStorage.getItem('hotelCurrentUser') || '{}');
            const bookings = JSON.parse(localStorage.getItem('hotelBookings') || '[]');
            const bills = JSON.parse(localStorage.getItem('hotelBills') || '[]');
            
            const userBookings = bookings.filter(b => b.userId === currentUser.id);
            const userBills = bills.filter(b => b.userId === currentUser.id);
            const today = new Date();
            
            const totalBookings = userBookings.length;
            const upcomingBookings = userBookings.filter(b => new Date(b.checkIn) > today).length;
            const totalSpent = userBills.filter(b => b.status === 'paid').reduce((sum, bill) => sum + bill.totalAmount, 0);
            
            document.getElementById('totalBookingsCount').textContent = totalBookings;
            document.getElementById('upcomingCount').textContent = upcomingBookings;
            document.getElementById('totalSpent').textContent = `$${totalSpent}`;
        }
        
        function exportBookings() {
            const currentUser = JSON.parse(localStorage.getItem('hotelCurrentUser') || '{}');
            const bookings = JSON.parse(localStorage.getItem('hotelBookings') || '[]');
            const userBookings = bookings.filter(b => b.userId === currentUser.id);
            
            const dataStr = JSON.stringify(userBookings, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `my-bookings-${new Date().toISOString().split('T')[0]}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            showNotification('Bookings exported successfully!', 'success');
        }
    </script>
</body>
</html>
